version: "3.8"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: agents-investing-searxng
    ports:
      - "8888:8888"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=agents-investing-searxng-secret-key-change-in-production
    restart: unless-stopped
    networks:
      - agents-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  agents-net:
    driver: bridge
    name: agents-net
