name: agents-investing

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alpha_db
      POSTGRES_USER: alpha_user
      POSTGRES_PASSWORD: alpha_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha_user -d alpha_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/alpha-lake;
      echo 'Bucket alpha-lake ready';
      "
    restart: "no"

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
    command: python scripts/db/init_db.py
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8000
      APP_URL: http://localhost:8000
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      # Gemini OAuth: 호스트의 gcloud ADC 인증 파일을 컨테이너에 마운트
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      # Claude CLI: 호스트 인증 정보를 읽기 전용으로 마운트
      - ${HOME}/.claude:/root/.claude:ro
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      GEN_API_URL: http://gen:9999
      ORCH_MODE: blend
      ORCH_INTERVAL_SECONDS: 120
      ORCH_RUN_ONCE: "false"
      ORCH_ENABLE_DAILY_REPORT: "false"
      ORCH_DAILY_REPORT_HOUR: "17"
      ORCH_DAILY_REPORT_MINUTE: "10"
      ORCH_TICKERS: ""
      ORCH_TOURNAMENT_ROLLING_DAYS: ""
      ORCH_TOURNAMENT_MIN_SAMPLES: ""
      ORCH_CONSENSUS_ROUNDS: ""
      ORCH_CONSENSUS_THRESHOLD: ""
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./:/app
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      # Claude CLI: 호스트 인증 정보를 읽기 전용으로 마운트
      - ${HOME}/.claude:/root/.claude:ro
    command: python scripts/run_orchestrator_worker.py

  gen:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - ./:/app
    command: uvicorn src.gen.server:app --host 0.0.0.0 --port 9999
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9999/gen/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  gen-collector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      GEN_API_URL: http://gen:9999
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      gen:
        condition: service_healthy
    volumes:
      - ./:/app
    command: python -m src.agents.gen_collector --gen-url http://gen:9999 --mode continuous --tick-cycles 60

  ui:
    build:
      context: ./ui/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./ui/web:/app
      - ui_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ui_node_modules:
