name: agents-investing

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alpha_db
      POSTGRES_USER: alpha_user
      POSTGRES_PASSWORD: alpha_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha_user -d alpha_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8000
      APP_URL: http://localhost:8000
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://alpha_user:alpha_pass@postgres:5432/alpha_db
      REDIS_URL: redis://redis:6379/0
      ORCH_MODE: blend
      ORCH_INTERVAL_SECONDS: 120
      ORCH_RUN_ONCE: "false"
      ORCH_ENABLE_DAILY_REPORT: "false"
      ORCH_DAILY_REPORT_HOUR: "17"
      ORCH_DAILY_REPORT_MINUTE: "10"
      ORCH_TICKERS: ""
      ORCH_TOURNAMENT_ROLLING_DAYS: ""
      ORCH_TOURNAMENT_MIN_SAMPLES: ""
      ORCH_CONSENSUS_ROUNDS: ""
      ORCH_CONSENSUS_THRESHOLD: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: python scripts/run_orchestrator_worker.py

  ui:
    build:
      context: ./ui/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./ui/web:/app
      - ui_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort

volumes:
  postgres_data:
  redis_data:
  ui_node_modules:
