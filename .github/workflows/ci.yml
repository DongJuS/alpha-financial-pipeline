# ================================================================
# CI Pipeline — lint → test → helm-lint → build → push
#
# 트리거: main PR, main push
# 레지스트리: GitHub Container Registry (ghcr.io)
# ================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dongjus/alpha-financial-pipeline

jobs:
  # ── Lint ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff check
        run: ruff check src/ scripts/ --output-format=github

  # ── Test ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: alpha_test_db
          POSTGRES_USER: alpha_user
          POSTGRES_PASSWORD: alpha_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alpha_user -d alpha_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://alpha_user:alpha_pass@localhost:5432/alpha_test_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret
      KIS_IS_PAPER_TRADING: "true"
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET_NAME: alpha-test-lake
      S3_REGION: ap-northeast-2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize DB schema
        run: python scripts/db/init_db.py

      - name: Run tests
        run: |
          pytest test/ -v --tb=short \
            --ignore=test/test_search_pipeline.py \
            -k "not integration"

  # ── Helm Lint ─────────────────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint k8s/helm/alpha-trading/

      - name: Helm template (dry render)
        run: helm template alpha-trading k8s/helm/alpha-trading/ > /dev/null

  # ── Build & Push ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./ui/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
