# MinIO 공식 Helm chart values (Bitnami 이미지 유료화로 전환)
# repo: helm repo add minio https://charts.min.io
# 설치: helm install alpha-minio minio/minio -n alpha-trading -f minio-values.yaml

mode: standalone

rootUser: minioadmin
rootPassword: minioadmin

buckets:
  - name: alpha-lake
    policy: none
    purge: false

persistence:
  enabled: true
  size: 20Gi
  storageClass: local-path

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

consoleIngress:
  enabled: false
