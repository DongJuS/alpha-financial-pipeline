apiVersion: v1
kind: ConfigMap
metadata:
  name: alpha-trading-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ .Values.api.port | quote }}
  APP_URL: "http://api:{{ .Values.api.port }}"
  DATABASE_URL: {{ include "alpha-trading.databaseUrl" . | quote }}
  REDIS_URL: {{ include "alpha-trading.redisUrl" . | quote }}
  S3_ENDPOINT_URL: {{ include "alpha-trading.s3EndpointUrl" . | quote }}
  S3_BUCKET_NAME: {{ .Values.infra.minio.bucket | quote }}
  LOG_LEVEL: "INFO"
  # Worker 설정
  {{- range $key, $val := .Values.worker.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
