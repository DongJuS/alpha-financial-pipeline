---
# RL 모델/실험 데이터 PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: worker-rl-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.worker.rlDataStorage | default "5Gi" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "alpha-trading.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "scripts/run_orchestrator_worker.py"]
          envFrom:
            - configMapRef:
                name: alpha-trading-config
            - secretRef:
                name: alpha-trading-secrets
          volumeMounts:
            - name: rl-data
              mountPath: /data/rl/models
              subPath: models
            - name: rl-data
              mountPath: /data/rl/experiments
              subPath: experiments
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "from pathlib import Path; assert Path('/app/src').exists()"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: rl-data
          persistentVolumeClaim:
            claimName: worker-rl-data
