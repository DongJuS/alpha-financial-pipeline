apiVersion: v1
kind: Secret
metadata:
  name: alpha-trading-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ⚠️ values.yaml의 기본값은 플레이스홀더입니다.
  # 배포 시 반드시 --set 또는 -f override-secrets.yaml로 실제 값을 주입하세요.
  JWT_SECRET: {{ .Values.secrets.jwt_secret | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgres_password | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3_access_key | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3_secret_key | quote }}
  # KIS API
  KIS_APP_KEY: {{ .Values.secrets.kis_app_key | quote }}
  KIS_APP_SECRET: {{ .Values.secrets.kis_app_secret | quote }}
  KIS_ACCOUNT_NUMBER: {{ .Values.secrets.kis_account_number | quote }}
  KIS_IS_PAPER_TRADING: {{ .Values.secrets.kis_is_paper_trading | quote }}
  # Telegram
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegram_bot_token | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.secrets.telegram_chat_id | quote }}
