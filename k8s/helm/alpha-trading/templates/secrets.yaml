apiVersion: v1
kind: Secret
metadata:
  name: alpha-trading-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 프로덕션 배포 시 실제 값으로 교체하거나 external-secrets로 관리
  JWT_SECRET: "change-this-to-a-long-random-secret-in-production"
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
  S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
  # KIS API (배포 후 kubectl로 업데이트)
  KIS_APP_KEY: ""
  KIS_APP_SECRET: ""
  KIS_ACCOUNT_NUMBER: ""
  KIS_IS_PAPER_TRADING: "true"
  # Telegram
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
