apiVersion: v1
kind: Secret
metadata:
  name: alpha-trading-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alpha-trading.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 앱 시크릿 (인프라 시크릿은 Bitnami chart에서 관리)
  JWT_SECRET: "change-this-to-a-long-random-secret-in-production"
  POSTGRES_PASSWORD: "alpha_pass"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  # KIS API (배포 후 kubectl로 업데이트)
  KIS_APP_KEY: ""
  KIS_APP_SECRET: ""
  KIS_ACCOUNT_NUMBER: ""
  KIS_IS_PAPER_TRADING: "true"
  # Telegram
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
