# ── 글로벌 설정 ────────────────────────────────────────────────────────
namespace: alpha-trading

image:
  repository: alpha-trading
  tag: latest
  pullPolicy: IfNotPresent

# ── 인프라 (Bitnami chart로 외부 관리) ────────────────────────────────
# PostgreSQL, Redis, MinIO는 Bitnami Helm chart로 별도 설치합니다.
# 설치 방법: k8s/helm/bitnami-values/README.md 참조
# 서비스명: postgresql (5432), redis-master (6379), minio (9000)
infra:
  postgres:
    host: postgresql
    port: 5432
    database: alpha_db
    user: alpha_user
  redis:
    host: redis-master
    port: 6379
  minio:
    host: minio
    port: 9000
    bucket: alpha-lake

# ── API 서버 ──────────────────────────────────────────────────────────
api:
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ── Worker (오케스트레이터) ────────────────────────────────────────────
worker:
  replicas: 1
  rlDataStorage: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    ORCH_MODE: blend
    ORCH_INTERVAL_SECONDS: "600"
    ORCH_RUN_ONCE: "false"
    ORCH_ENABLE_DAILY_REPORT: "false"

# ── UI (프론트엔드) ───────────────────────────────────────────────────
ui:
  enabled: true
  replicas: 1
  image: alpha-trading-ui
  tag: latest
  port: 5173
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Ingress (K3s Traefik) ────────────────────────────────────────────
ingress:
  enabled: true
  className: traefik
  host: alpha.local
  tls: false

# ── Pod Disruption Budget ────────────────────────────────────────────
pdb:
  api:
    minAvailable: 1
