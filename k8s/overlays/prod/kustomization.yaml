apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/resource-limits.yaml
  - path: patches/replicas.yaml

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=INFO
      - DYNAMIC_BLEND_WEIGHTS_ENABLED=true
      - MARKET_HOURS_ENFORCED=true
