apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/resource-limits.yaml
  - path: patches/storage.yaml

# dev 환경: 리소스 최소화, 디버그 로그
configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=DEBUG
      - DYNAMIC_BLEND_WEIGHTS_ENABLED=false
