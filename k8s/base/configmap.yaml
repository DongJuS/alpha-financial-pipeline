apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production
  PORT: "8000"
  APP_URL: http://localhost:8000
  # 인프라 서비스 연결 — Bitnami Helm release명 기준
  # deploy.sh에서 release명을 변경하면 여기도 맞춰야 함
  DATABASE_URL: postgresql://alpha_user:alpha_pass@alpha-pg-postgresql:5432/alpha_db
  REDIS_URL: redis://alpha-redis-master:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET_NAME: alpha-lake
  LOG_LEVEL: INFO
  MARKET_HOURS_ENFORCED: "true"
  # 전략 설정
  STRATEGY_BLEND_WEIGHTS: '{"A": 0.33, "B": 0.33, "RL": 0.34}'
  DYNAMIC_BLEND_WEIGHTS_ENABLED: "false"
  # 오케스트레이터 기본값 (worker env로 오버라이드 가능)
  ORCH_MODE: blend
  ORCH_INTERVAL_SECONDS: "120"
