apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production
  PORT: "8000"
  APP_URL: http://localhost:8000
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET_NAME: alpha-lake
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  LOG_LEVEL: INFO
  MARKET_HOURS_ENFORCED: "true"
  # 전략 설정
  STRATEGY_BLEND_WEIGHTS: '{"A": 0.30, "B": 0.30, "RL": 0.20, "S": 0.20}'
  DYNAMIC_BLEND_WEIGHTS_ENABLED: "false"
  # 오케스트레이터 기본값 (worker env로 오버라이드 가능)
  ORCH_MODE: blend
  ORCH_INTERVAL_SECONDS: "120"
