# 실제 값은 overlay에서 kustomize secretGenerator로 주입하거나
# kubectl create secret으로 별도 생성합니다.
# 이 파일은 필요한 Secret 구조만 정의합니다.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: alpha_db
  POSTGRES_USER: alpha_user
  POSTGRES_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
type: Opaque
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DATABASE_URL: postgresql://alpha_user:CHANGE_ME@postgres:5432/alpha_db
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: CHANGE_ME
  ANTHROPIC_API_KEY: CHANGE_ME
  OPENAI_API_KEY: CHANGE_ME
  KIS_PAPER_APP_KEY: CHANGE_ME
  KIS_PAPER_APP_SECRET: CHANGE_ME
  KIS_PAPER_ACCOUNT_NUMBER: CHANGE_ME
