# 앱 시크릿만 정의. 인프라 시크릿은 Bitnami/MinIO Helm이 관리.
# ⚠️ 아래 값은 로컬 개발용 플레이스홀더입니다.
# 프로덕션 배포 시 반드시 실제 값으로 교체하세요.
# 방법: kubectl create secret generic app-secret --from-literal=DATABASE_URL=xxx ...
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  JWT_SECRET: change-this-to-a-long-random-secret-in-production
  # DB (비밀번호 포함이므로 Secret에서 관리)
  DATABASE_URL: postgresql://alpha_user:change-me@alpha-pg-postgresql:5432/alpha_db
  # S3 / MinIO
  S3_ACCESS_KEY: change-me
  S3_SECRET_KEY: change-me
  # KIS Paper Trading
  KIS_IS_PAPER_TRADING: "true"
  KIS_PAPER_APP_KEY: ""
  KIS_PAPER_APP_SECRET: ""
  KIS_PAPER_ACCOUNT_NUMBER: ""
