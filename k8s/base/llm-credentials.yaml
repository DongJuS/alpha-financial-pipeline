# LLM 인증 정보 — Claude OAuth Token + Gemini ADC
#
# 생성 방법:
#   1. Claude OAuth Token 발급 (터미널에서 직접 실행):
#      claude setup-token
#      → 발급된 토큰 복사
#
#   2. Secret 생성:
#      kubectl create secret generic llm-credentials \
#        --namespace alpha-trading \
#        --from-literal=CLAUDE_CODE_OAUTH_TOKEN="<발급받은_토큰>" \
#        --from-file=gcloud-adc.json=$HOME/.config/gcloud/application_default_credentials.json \
#        --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
type: Opaque
data: {}
# data는 kubectl create secret 명령으로 채워짐 (위 주석 참조)
