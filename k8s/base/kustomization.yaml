apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alpha-trading

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - minio.yaml
  - api.yaml
  - worker.yaml
  - ui.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: alpha-trading
      app.kubernetes.io/managed-by: kustomize
