apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alpha-trading

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  # 인프라(postgres/redis/minio)는 Bitnami Helm chart로 배포.
  # k8s/helm/bitnami-values/ 참조.
  - api.yaml
  - worker.yaml
  - ui.yaml
  - gen.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: alpha-trading
      app.kubernetes.io/managed-by: kustomize
