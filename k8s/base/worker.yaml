apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  strategy:
    type: Recreate            # 워커는 단일 인스턴스 (분산 락으로 보호되지만 안전하게)
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: alpha-trading:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: ORCH_MODE
              value: blend
            - name: ORCH_INTERVAL_SECONDS
              value: "120"
            - name: ORCH_RUN_ONCE
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          volumeMounts:
            - name: rl-data
              mountPath: /app/artifacts/rl
          command: ["python", "scripts/run_orchestrator_worker.py"]
      volumes:
        - name: rl-data
          persistentVolumeClaim:
            claimName: rl-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rl-data-pvc
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
