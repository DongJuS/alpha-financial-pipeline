# ruff.toml — Ruff linter 설정
#
# load_dotenv() 패턴으로 E402 (module level import not at top) 다수 발생.
# 프로젝트 구조상 의도적인 패턴이므로 무시.

[lint]
select = ["F", "E"]
ignore = [
    "E402",   # Module level import not at top of file (load_dotenv 패턴)
    "E501",   # Line too long
]

[lint.per-file-ignores]
# __init__.py의 re-export는 F401 무시
"__init__.py" = ["F401"]
