[pytest]
# ================================================================
# pytest.ini — pytest 설정 파일
# ================================================================

# 테스트 경로 지정
testpaths = test

# asyncio 테스트 모드
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# 최소 Python 버전
minversion = 8.0

# 마커 정의
markers =
    slow: 오래 걸리는 테스트
    integration: 통합 테스트 (DB, Redis 필요)
    unit: 단위 테스트 (외부 의존성 없음)
    broker: 브로커 관련 테스트
    strategy: 전략 관련 테스트
    rl: 강화학습 관련 테스트
    search: 검색 파이프라인 테스트

# 로그 캡처 설정
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 콘솔 출력 형식
console_output_style = progress

# Verbose 기본값
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
